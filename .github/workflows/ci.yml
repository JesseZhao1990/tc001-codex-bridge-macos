name: macOS CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7
      - name: Run tests
        run: ./run-tests.sh
      - name: Build current architecture
        run: ./build.sh
      - name: Verify signature
        run: codesign --verify --deep --strict "dist/TC001 Bridge.app"
