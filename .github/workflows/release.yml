name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - name: Run tests
        run: ./run-tests.sh

      - name: Build universal application
        run: ARCHS="arm64 x86_64" ./build.sh

      - name: Verify release artifact
        run: |
          expected_version="${GITHUB_REF_NAME#v}"
          actual_version="$(plutil -extract CFBundleShortVersionString raw "dist/TC001 Bridge.app/Contents/Info.plist")"
          test "$actual_version" = "$expected_version"

          test "$(lipo -archs "dist/TC001 Bridge.app/Contents/MacOS/TC001Bridge")" = "x86_64 arm64"
          test "$(lipo -archs "dist/TC001 Bridge.app/Contents/Helpers/TC001UpdateHelper")" = "x86_64 arm64"
          codesign --verify --deep --strict --verbose=2 "dist/TC001 Bridge.app"

          cd dist
          shasum -a 256 -c "TC001-Bridge-macOS.zip.sha256"

      - name: Prepare release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v heading="## $version" '
            $0 == heading { capture = 1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"
          test -s "$RUNNER_TEMP/release-notes.md"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/TC001-Bridge-macOS.zip#TC001 Bridge for macOS" \
            "dist/TC001-Bridge-macOS.zip.sha256#SHA-256 checksum" \
            --repo "$GITHUB_REPOSITORY" \
            --title "TC001 Bridge $GITHUB_REF_NAME" \
            --notes-file "$RUNNER_TEMP/release-notes.md" \
            --verify-tag
